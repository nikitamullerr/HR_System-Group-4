<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ModernTech · Employee Management</title>

<!-- Bootstrap Icons -->

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Shared Stylesheet -->

<link rel="stylesheet" href="css/style.css">

<!-- Load Saved Theme Before Page Renders -->

<script>
try {
    document.documentElement.setAttribute(
        "data-theme",
        localStorage.getItem("mt-theme") || "light"
    );
} catch (e) {}
</script>

</head>

<body data-page="employees">

<!-- ==================================================
     APPLICATION LAYOUT
     Matches Attendance Page Structure
================================================== -->

<div id="app">


<div class="layout">

    <!-- Sidebar Placeholder -->
    <aside
        class="sidebar"
        id="sidebar">
    </aside>

    <!-- Mobile Overlay -->
    <div
        class="scrim"
        id="scrim">
    </div>

    <!-- Main Column -->
    <div class="col">

        <!-- Dynamic Navigation -->
        <header
            class="topbar"
            id="topbar">
        </header>

        <!-- Dynamic Employee Content -->
        <main
            class="main"
            id="main">
        </main>

    </div>

</div>


</div>

<!-- ==================================================
     EMPLOYEE DETAILS MODAL
================================================== -->

<div
    class="modal-bg"
    id="employeeModal">


<div class="modal">

    <div class="mhead">

        Employee Details

        <button
            id="closeModal"
            type="button">

            &times;

        </button>

    </div>

    <div
        class="mbody"
        id="modalContent">
    </div>

</div>


</div>

<!-- ==================================================
     EDIT EMPLOYEE MODAL
================================================== -->

<div
    class="modal-bg"
    id="editModal">


<div class="modal">

    <div class="mhead">

        Edit Employee

        <button
            id="closeEditModal"
            type="button">

            &times;

        </button>

    </div>

    <div class="mbody">

        <label>Name</label>

        <input
            type="text"
            id="editName"
            class="field">

        <label>Position</label>

        <input
            type="text"
            id="editPosition"
            class="field">

        <label>Department</label>

        <input
            type="text"
            id="editDepartment"
            class="field">

        <label>Contact</label>

        <input
            type="text"
            id="editContact"
            class="field">

        <label>Salary</label>

        <input
            type="number"
            id="editSalary"
            class="field">

    </div>

    <div class="mfoot">

        <button
            id="saveEmployeeBtn"
            class="btn"
            type="button">

            Save Changes

        </button>

    </div>

</div>


</div>

<!-- ==================================================
     TOAST NOTIFICATION
================================================== -->

<div
    class="toast"
    id="toast">
</div>

<!-- ==================================================
     EMPLOYEES PAGE SCRIPT
================================================== -->

<script src="javascript/employees.js"></script>

</body>
</html>
