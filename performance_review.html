<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ModernTech · Performance Reviews</title>

<link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="css/style.css">

<script>
try{
    document.documentElement.setAttribute(
        "data-theme",
        localStorage.getItem("mt-theme") || "light"
    );
}catch(e){}
</script>

</head>

<body data-page="performance_review">

<div id="app">

    <div class="layout">

        <!-- SIDEBAR -->
        <aside
            class="sidebar"
            id="sidebar">
        </aside>

        <!-- MOBILE SCRIM -->
        <div
            class="scrim"
            id="scrim">
        </div>

        <div class="col">

            <!-- TOPBAR -->
            <header
                class="topbar"
                id="topbar">
            </header>

            <!-- MAIN CONTENT
                 Generated entirely by JavaScript -->
            <main
                class="main"
                id="main">
            </main>

        </div>

    </div>

</div>

<!-- REVIEW DETAILS MODAL -->

<div
    id="reviewModal"
    class="modal-bg">

    <div class="modal">

        <div class="mhead">

            Performance Review Details

            <button id="closeModal">
                <i class="bi bi-x-lg"></i>
            </button>

        </div>

        <div
            class="mbody"
            id="modalContent">
        </div>

    </div>

</div>

<!-- EDIT REVIEW MODAL -->

<div
    id="editModal"
    class="modal-bg">

    <div class="modal">

        <div class="mhead">

            Edit Review

            <button id="closeEditModal">
                <i class="bi bi-x-lg"></i>
            </button>

        </div>

        <div class="mbody">

            <label>
                Rating
            </label>

            <select
                id="editRating"
                class="field">

                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>

            </select>

            <label>
                Strengths
            </label>

            <textarea
                id="editStrengths"
                class="field">
            </textarea>

            <label>
                Areas For Improvement
            </label>

            <textarea
                id="editImprovements"
                class="field">
            </textarea>

            <label>
                Development Goals
            </label>

            <textarea
                id="editGoals"
                class="field">
            </textarea>

            <label>
                Manager Comments
            </label>

            <textarea
                id="editComments"
                class="field">
            </textarea>

        </div>

        <div class="mfoot">

            <button
                id="saveReviewBtn"
                class="btn">

                Save Changes

            </button>

        </div>

    </div>

</div>

<script src="javascript/performance_review.js"></script>

</body>
</html>
